<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dodoku — You're In!</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d2137;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
    }
    .container { max-width: 480px; width: 100%; }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      margin-bottom: 24px;
    }
    h1 { font-size: 1.8rem; color: #ffffff; margin-bottom: 16px; }
    p { font-size: 1rem; color: #b0c4d8; line-height: 1.6; margin-bottom: 12px; }
    .highlight { color: #7eb8e0; font-weight: 600; }
    .back {
      display: inline-block;
      margin-top: 24px;
      color: #7eb8e0;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <img src="icon.png" alt="Dodoku" class="icon">
    <h1>You're In!</h1>
    <p>Thanks for signing up to beta test <span class="highlight">Dodoku</span>.</p>
    <p>You'll receive a Google Play testing invite at the email you provided. Keep an eye on your inbox!</p>
    <a href="index.html" class="back">&larr; Back to Dodoku</a>
  </div>
</body>
</html>
